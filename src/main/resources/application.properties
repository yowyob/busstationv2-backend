spring.application.name=bus_station_backend
server.port=${PORT:8085}

# --- Base de donnees Reactive (R2DBC + PostgreSQL) ---
spring.r2dbc.url=${R2DBC_URL:r2dbc:postgresql://localhost:5432/bus_station}
spring.r2dbc.username=${DB_USERNAME:app_transaction}
spring.r2dbc.password=${DB_PASSWORD:password}
spring.r2dbc.pool.initial-size=1
spring.r2dbc.pool.max-size=5
spring.r2dbc.pool.max-acquire-time=30s
spring.r2dbc.pool.max-idle-time=30m
spring.r2dbc.pool.max-life-time=10m
spring.r2dbc.pool.acquire-retry=3
spring.r2dbc.pool.validation-query=SELECT 1

# --- Liquibase (Schema Migration) ---
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.url=${JDBC_URL:jdbc:postgresql://localhost:5432/bus_station}
spring.liquibase.user=${LIQUIBASE_USERNAME:app_liquibase}
spring.liquibase.password=${LIQUIBASE_PASSWORD:password}
spring.liquibase.enabled=true

spring.sql.init.mode=never

# --- Redis ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# --- Kafka ---
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.properties.security.protocol=PLAINTEXT
spring.autoconfigure.exclude=${KAFKA_DISABLED:}
# On desactive SASL
# spring.kafka.properties.sasl.mechanism=SCRAM-SHA-256
# spring.kafka.properties.sasl.jaas.config=...
spring.kafka.consumer.group-id=bus-station-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# CUSTOM CONFIG - EXTERNAL SERVICES
application.external.stock-service-url=http://localhost:8081
application.external.fare-calculator-url=https://fare-calculator-service.pynfi.com

# CUSTOM CONFIG - KAFKA TOPICS
application.kafka.topics.product-events=test-topic
application.kafka.topics.notification-service-create-topic=notification-create-topic
application.kafka.topics.offer-created=offer-created-topic
application.kafka.topics.offer-send=notification-send-topic

# CUSTOM CONFIG - NOTIFICATION REGISTRATION
application.kafka.notification-registration.name=Bus Station
application.kafka.notification-registration.email.host=smtp.gmail.com
application.kafka.notification-registration.email.port=587
application.kafka.notification-registration.email.username=
application.kafka.notification-registration.email.password=

# CUSTOM CONFIG - NOTIFICATION SERVICE
application.kafka.notification-service.token=token-topic
application.kafka.notification-service.template.new-offer-id=1001
application.kafka.notification-service.template.accepted-offer-id=1002

# --- Email (desactive en local) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- App Custom Props ---
app.email.from-email=local@test.com
app.email.from-name=BusStation
app.email.support-email=local@test.com
app.email.base-url=http://localhost:8081
app.email.logo-url=http://localhost:8081/logo.png

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

# --- Paiement (cles de test) ---
payment.apiKey=${PAYMENT_API_KEY:3qUkt_O1YcClmouM6_-W-dZ5bWdx13uf}
payment.secretKey=${PAYMENT_SECRET_KEY:GNqTDwTVmW9WXXFqJSd_IYbISWMy3mrMULxeu3fEz80sVWGGMeb4iZlfNI2quRYH}

# --- Media service ---
application.external.media-service-name=busstation
application.external.media-service-url=https://media-service.pynfi.com

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.export.prometheus.enabled=true

# --- Resilience4J ---
resilience4j.circuitbreaker.instances.stock-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.stock-service.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.stock-service.slidingWindowSize=5
resilience4j.circuitbreaker.instances.fare-calculator-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.fare-calculator-service.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.fare-calculator-service.slidingWindowSize=5

# --- Swagger ---
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# --- Logging ---
logging.level.org.springframework.web=INFO
logging.level.org.springframework.r2dbc=DEBUG
logging.level.cm.yowyob.bus_station_backend=DEBUG