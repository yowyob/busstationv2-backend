# src/test/resources/application-test.properties

spring.application.name=bus_station_backend-test

# R2DBC H2
spring.r2dbc.url=r2dbc:h2:mem:///testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.r2dbc.username=sa
spring.r2dbc.password=
spring.sql.init.mode=always
spring.r2dbc.initialization-mode=always
spring.r2dbc.pool.initial-size=1
spring.r2dbc.pool.max-size=5

# Disable Redis repositories for mocking
spring.data.redis.repositories.enabled=false

# Disable Liquibase for tests (using schema.sql instead)
spring.liquibase.enabled=false

# Kafka pour les tests - ces propriétés seront écrasées par les mocks
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Désactiver les features non nécessaires en test
spring.cloud.compatibility-verifier.enabled=false

# Logs
logging.level.org.springframework.r2dbc=DEBUG
logging.level.cm.yowyob.bus_station_backend=DEBUG
logging.level.org.testcontainers=INFO

# Désactiver la sécurité stricte pour les tests
management.endpoints.web.exposure.include=*

